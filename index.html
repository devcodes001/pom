<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FocusFlow — Pomodoro Timer &amp; Task Manager</title>
  <meta name="description" content="A modern Pomodoro timer and task manager. Stay focused, manage tasks, and track your productivity.">
  <link rel="icon" href="assets/icon.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ─── Main Content ─── -->
  <main class="content dashboard-mode" id="content">
    <header class="top-bar" id="top-bar">
      <div class="logo-area">
        <span class="logo-icon">🍅</span>
        <span class="logo-text">FocusFlow</span>
      </div>
      <div class="greeting" id="greeting"></div>
      
      <div class="top-bar-right">
        <div class="daily-goal-compact" id="daily-goal">
          <div class="goal-count" id="goal-count">0 / 8</div>
          <div class="goal-progress" id="goal-progress"></div>
        </div>
        
        <button class="theme-toggle" id="theme-toggle" title="Toggle theme (Ctrl+T)">
          <svg class="theme-icon moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
          <svg class="theme-icon sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        </button>
        
        <button class="theme-toggle" id="settings-toggle" title="Settings">
          <svg class="theme-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
        </button>
      </div>
    </header>

    <div class="dashboard-grid">
      <!-- ─── Top Left: Timer ─── -->
      <section class="dashboard-panel panel-timer" id="page-timer">
        <!-- Timer will be injected here -->
      </section>

      <!-- ─── Top Right: Set Timer ─── -->
      <section class="dashboard-panel panel-set-timer" id="page-set-timer">
        <!-- Presets will be injected here -->
      </section>

      <!-- ─── Bottom Left: Tasks ─── -->
      <section class="dashboard-panel panel-tasks" id="page-tasks">
        <!-- Tasks will be injected here -->
      </section>

      <!-- ─── Bottom Right: Stats ─── -->
      <section class="dashboard-panel panel-stats" id="page-stats">
        <!-- Stats will be injected here -->
      </section>
    </div>
  </main>

  <!-- ─── Modals ─── -->
  <!-- Settings Modal -->
  <div class="modal-overlay" id="settings-modal-overlay">
    <div class="modal modal-large" id="settings-modal">
      <div class="modal-header">
        <div class="modal-title" style="margin-bottom: 0;">Settings</div>
        <button class="btn-icon" id="settings-close" title="Close Settings">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
      </div>
      <div id="page-settings" style="margin-top: var(--spacing-lg); max-height: 70vh; overflow-y: auto;">
        <!-- Settings will be injected here -->
      </div>
    </div>
  </div>

  <!-- Task Dialog Modal -->
  <div class="modal-overlay" id="task-modal-overlay">
    <div class="modal" id="task-modal">
      <!-- Content injected via tasks-page.js -->
    </div>
  </div>

  <!-- ─── Toast container ─── -->
  <div class="toast-container" id="toast-container"></div>

  <!-- ─── External Dependencies ─── -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>

  <!-- ─── Core Modules ─── -->
  <script src="js/storage.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/settings.js"></script>
  <script src="js/pomodoro.js"></script>
  <script src="js/tasks.js"></script>
  <script src="js/notifier.js"></script>

  <!-- ─── UI Pages ─── -->
  <script src="js/timer-page.js"></script>
  <script src="js/tasks-page.js"></script>
  <script src="js/stats-page.js"></script>
  <script src="js/settings-page.js"></script>

  <!-- ─── App Entry ─── -->
  <script src="js/app.js"></script>
</body>
</html>
